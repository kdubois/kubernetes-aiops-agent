version: 2
updates:
  # Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      quarkus:
        patterns:
          - "io.quarkus*"
          - "io.quarkiverse*"
        update-types:
          - "minor"
          - "patch"
      langchain4j:
        patterns:
          - "dev.langchain4j*"
        update-types:
          - "minor"
          - "patch"
      maven-plugins:
        patterns:
          - "*maven-plugin"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.assertj*"
          - "org.awaitility*"
          - "io.rest-assured*"
        update-types:
          - "minor"
          - "patch"
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
